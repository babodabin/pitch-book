<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>구종 도감</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#05070c">
<link rel="apple-touch-icon" href="icon-180.png">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { background:#05070c; }
  body {
    font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;
    color:#dfe3e8;
    user-select:none; -webkit-user-select:none;
    padding-top:max(env(safe-area-inset-top), 10px);
    padding-bottom:max(env(safe-area-inset-bottom), 16px);
  }
  #page { max-width:560px; margin:0 auto; }
  header {
    padding:8px 16px 10px 16px;
    display:flex; align-items:baseline; gap:10px;
    background:linear-gradient(180deg, rgba(90,143,212,0.10), transparent);
  }
  header h1 {
    font-family:'Special Elite', monospace; font-size:23px; font-weight:400;
    letter-spacing:0.14em; color:#fff;
    text-shadow:0 0 14px rgba(120,170,255,0.45);
  }
  header .sub { font-size:13px; color:#7a8290; }

  #pitch-bar {
    display:flex; gap:8px; overflow-x:auto; padding:4px 16px 10px 16px;
    -webkit-overflow-scrolling:touch;
  }
  #pitch-bar::-webkit-scrollbar { display:none; }
  .p-chip {
    flex:0 0 auto;
    font-size:16px; font-weight:700;
    padding:10px 16px 10px 13px; border-radius:24px;
    background:#10141d; border:1.5px solid #2a3242; color:#aab2c0;
    display:flex; align-items:center; gap:7px;
  }
  .p-chip:active { transform:scale(0.95); }
  .p-chip::before {
    content:''; width:9px; height:9px; border-radius:50%;
    background:var(--c); box-shadow:0 0 6px var(--c);
  }
  .p-chip.on {
    border-color:var(--c); color:#fff;
    background:linear-gradient(180deg, rgba(255,255,255,0.07), rgba(0,0,0,0));
    box-shadow:0 0 12px color-mix(in srgb, var(--c) 45%, transparent);
  }

  #info {
    padding:2px 16px 8px 16px;
    display:flex; align-items:baseline; gap:12px; flex-wrap:wrap;
  }
  #p-name { font-size:24px; font-weight:800; }
  #p-speed { font-size:16px; color:#8a93a3; font-weight:600; }

  #tabs { display:flex; gap:8px; padding:0 16px 10px 16px; }
  .tab {
    flex:1; text-align:center;
    font-size:16px; font-weight:700;
    padding:11px 0; border-radius:12px;
    background:#10141d; border:1.5px solid #2a3242; color:#aab2c0;
  }
  .tab.on {
    background:linear-gradient(180deg, #243150, #1b2433);
    border-color:#5a8fd4; color:#fff;
    box-shadow:0 0 10px rgba(90,143,212,0.35);
  }

  #canvas-box {
    position:relative; margin:0 12px; height:54vh; min-height:340px;
    border-radius:14px; overflow:hidden; border:1.5px solid #222b3a;
  }
  canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }
  #hand-wrap {
    position:absolute; top:10px; right:10px;
    display:flex; flex-direction:column; gap:7px; align-items:flex-end;
  }
  #hand-btn, #bat-btn {
    font-size:14px; font-weight:800;
    padding:9px 14px; border-radius:20px;
    background:rgba(10,16,28,0.85); border:1.5px solid #3a4660; color:#cfd6e4;
    backdrop-filter:blur(4px);
  }
  #hand-btn:active, #bat-btn:active { transform:scale(0.94); }
  #matchup {
    position:absolute; left:10px; top:10px;
    font-size:13px; font-weight:700;
    padding:7px 12px; border-radius:10px;
    background:rgba(10,16,28,0.85); border:1.5px solid #3a4660; color:#dfe3e8;
    backdrop-filter:blur(4px); line-height:1.4;
  }
  #matchup .tag { font-size:11px; color:#7a8290; font-weight:600; }

  #controls { display:flex; gap:10px; padding:12px 16px 8px 16px; }
  .mode-btn {
    flex:1; font-size:17px; font-weight:800; letter-spacing:0.04em;
    padding:15px 0; border-radius:13px; border:none;
  }
  .mode-btn:active { transform:translateY(2px); }
  #real-btn { background:#fff; color:#000; }
  #study-btn { background:#1b2433; color:#ffd23b; border:1.5px solid #4a4020; }

  #detail { padding:6px 16px 30px 16px; }
  .d-card {
    background:#0d1320; border:1.5px solid #1f2940; border-radius:14px;
    padding:15px 16px; margin-bottom:10px;
  }
  .d-card .lb { font-size:13px; font-weight:800; letter-spacing:0.08em; color:#5a8fd4; margin-bottom:6px; }
  .d-card .tx { font-size:16px; line-height:1.65; color:#cdd4e0; }
  .d-card.use .lb { color:#52e07a; }
  .d-card.course .lb { color:#ff9a3d; }
</style>
</head>
<body>
<div id="page">
  <header>
    <h1>PITCH BOOK</h1>
    <div class="sub">구종 도감</div>
  </header>
  <div id="pitch-bar"></div>
  <div id="info">
    <div id="p-name"></div>
    <div id="p-speed"></div>
  </div>
  <div id="tabs">
    <div class="tab on" data-v="front">타자 시점</div>
    <div class="tab" data-v="side">옆에서</div>
    <div class="tab" data-v="grip">그립</div>
  </div>
  <div id="canvas-box">
    <canvas id="cv"></canvas>
    <div id="hand-wrap">
      <button id="hand-btn">🔵 우투수</button>
      <button id="bat-btn">🔴 우타자</button>
    </div>
    <div id="matchup"></div>
  </div>
  <div id="controls">
    <button class="mode-btn" id="real-btn">실전 ▶ 실제 속도</button>
    <button class="mode-btn" id="study-btn">학습 ▶ 느리게</button>
  </div>
  <div id="detail">
    <div class="d-card"><div class="lb">특징</div><div class="tx" id="d-desc"></div></div>
    <div class="d-card use"><div class="lb">용도 — 왜 던지나</div><div class="tx" id="d-use"></div></div>
    <div class="d-card course"><div class="lb">추천 코스 — 어디에 던지나</div><div class="tx" id="d-course"></div></div>
    <div class="d-card"><div class="lb">회전</div><div class="tx" id="d-spin"></div></div>
  </div>
</div>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
<script>

     fingers:[[-0.16,-0.42],[0.16,-0.42]], thumb:[0,0.6],
     gripType:'fourseam', gripTxt:'검지·중지를 모아 실밥이 가장 넓은 C자 가로줄 위에 가볍게 얹습니다. 손가락 끝 두 마디가 실밥에 닿는 게 핵심. 공을 깊이 쥐지 않고 손바닥과 공 사이에 틈을 둡니다.',

    {key:'2seam', name:'투심 패스트볼', color:'#cfe8ff', v:146, bx:0.22, by:0.22, shape:'gradual',

     use:'땅볼 공장. 배트 위쪽에 맞춰 내야 땅볼을 만듭니다. 1점이 아까운 상황, 병살이 필요할 때.',
     course:'존 낮은 쪽 절반. 낮게 깔리는 싱커는 퍼올리기가 거의 불가능합니다.'},
    {key:'knuckle', name:'너클볼', color:'#c9a6ff', v:105, bx:0, by:0.3, shape:'knuckle',
     tx:0, ty:0.75, spin:'none', spinSpd:0.015, seamRot:0.6,
     fingers:[[-0.18,-0.36],[0.05,-0.43],[0.28,-0.32]], thumb:[-0.08,0.58],
     gripType:'knuckle', gripTxt:'손가락을 펴지 않고 손톱(또는 손가락 끝 관절)을 공 표면에 세워 박습니다. 엄지로 받칩니다. 릴리스 때 회전을 거의 0으로 — 손끝으로 밀어내듯 던집니다.',
     spinTxt:'무회전 — 공기 흐름이 실밥에 걸리며 제멋대로 흔들립니다.',
     desc:'회전을 죽여 던지는 마구. 나비처럼 흔들리며 날아와서 던진 투수도, 받는 포수도 어디로 갈지 모릅니다.',
     use:'예측 불가능 그 자체. 팔에 부담이 적어 너클볼러는 40대까지 던집니다.',
     course:'코스를 노리는 공이 아닙니다. 존 한가운데로 던져도 공이 알아서 도망다닙니다.'}
  ];

  // ───────── DOM ─────────
  const $=id=>document.getElementById(id);
  const cv=$('cv'), ctx=cv.getContext('2d');
  const box=$('canvas-box');
  let W=0,H=0,DPR=1;
  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    const r=box.getBoundingClientRect();
    W=r.width; H=r.height;
    cv.width=W*DPR; cv.height=H*DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);

  let cur=PITCHES[0];
  let view='front';
  let mode='study';        // 'real' | 'study'
  let lefty=false;         // 투수: false=우투, true=좌투
  let batLefty=false;      // 타자: false=우타, true=좌타
  let throwT=-1;
  let knSeed=1;
  let trail=[];
  let path=[];          // 영구 궤적 (월드 좌표) — 다른 구종/탭 누를 때만 초기화
  let pathDone=false;   // 도착 완료 후에도 전체 궤적 유지

  // ───────── 원근 투영 (타자 시점) ─────────
  // 존 폭이 화면의 46%가 되도록 줌 설정 → 모든 크기가 같은 자로 그려짐
  function proj(X, Y, d){
    // X: 좌우 m (+=화면 오른쪽/1루쪽), Y: 높이 m, d: 플레이트로부터 거리 m
    const dist=d+CAM_BEHIND;
    const S=(W*0.46/ZONE_W)*(CAM_BEHIND/dist)*(1+0/1);
    const HOR=H*0.34;   // 눈높이(지평선) 화면 위치
    return {
      x: W/2 + X*S,
      y: HOR + (EYE_H-Y)*S,
      s: S
    };
  }

  const bar=$('pitch-bar');
  PITCHES.forEach(p=>{
    const c=document.createElement('div');
    c.className='p-chip';
    c.style.setProperty('--c', p.color);
    c.textContent=p.name.split(' ')[0];
    c.addEventListener('click', ()=>{
      cur=p;
      document.querySelectorAll('.p-chip').forEach(x=>x.classList.remove('on'));
      c.classList.add('on');
      updateInfo();
      doThrow(mode);
    });
    bar.appendChild(c);
  });
  bar.firstChild.classList.add('on');

  function updateInfo(){
    $('p-name').textContent=cur.name;
    $('p-name').style.color=cur.color;
    $('p-speed').textContent=cur.v+' km/h급';
    $('d-desc').textContent=cur.desc;
    $('d-use').textContent=cur.use;
    $('d-course').textContent=cur.course;
    $('d-spin').textContent=cur.spinTxt;
  }

  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
      t.classList.add('on');
      view=t.dataset.v;
      const show = view==='front' ? 'flex':'none';
      $('hand-wrap').style.display=show;
      $('matchup').style.display = view==='front' ? 'block':'none';
      doThrow(mode);
    });
  });

  $('real-btn').addEventListener('click', ()=>doThrow('real'));
  $('study-btn').addEventListener('click', ()=>doThrow('study'));
  $('hand-btn').addEventListener('click', ()=>{
    lefty=!lefty;
    updateMatchup();
    doThrow(mode);
  });
  $('bat-btn').addEventListener('click', ()=>{
    batLefty=!batLefty;
    updateMatchup();
    doThrow(mode);
  });

  function updateMatchup(){
    $('hand-btn').textContent = lefty? '🔵 좌투수':'🔵 우투수';
    $('bat-btn').textContent  = batLefty? '🔴 좌타자':'🔴 우타자';
    const same = (lefty===batLefty);   // 같은 손 매치업
    const pT = lefty?'좌투':'우투';
    const bT = batLefty?'좌타':'우타';
    const rel = same
      ? '같은 손 (슬라이더·스위퍼가 가장 위력적)'
      : '반대 손 (체인지업이 강력)';
    $('matchup').innerHTML =
      '<span class="tag">매치업</span> '+pT+' vs '+bT+'<br>'+
      '<span class="tag">'+rel+'</span>';
  }

  function doThrow(m){
    mode=m;
    if(view==='grip'){ throwT=-1; return; }
    throwT=performance.now()+600;
    knSeed=Math.random()*1000;
    trail=[];
    path=[];
    pathDone=false;
  }

  function flightDur(){
    const real=RELEASE_D/(cur.v/3.6)*1000;
    return mode==='real'? real : real*5.5;
  }

  function breakShape(t, shape){
    // 커브(early): 앞은 거의 직선, 뒤로 갈수록 급격히 휘어 떨어짐 (t^2.6)
    if(shape==='early') return Math.pow(t, 2.6);
    if(shape==='late')  return t<0.6? t*0.15 : 0.09+Math.pow((t-0.6)/0.4,2)*0.91;
    return t*t*0.65+t*0.35;
  }
  function knWobble(t, seed){
    return {
      x: Math.sin(t*9+seed)*0.5 + Math.sin(t*23+seed*2)*0.3,
      y: Math.cos(t*7+seed)*0.4 + Math.sin(t*17+seed*3)*0.25
    };
  }

  // 비행 위치 (월드 좌표, 미터)
  function ballWorld(tN){
    const sgn=lefty?-1:1;
    const relX=-0.45*sgn;
    const bx=cur.bx*sgn;
    const d=RELEASE_D*(1-tN);            // 거리: 릴리스 → 플레이트(0)
    const bk=breakShape(Math.min(tN,1), cur.shape);
    // 변화 없는 기준 직선 (릴리스 → 목표)
    const X0=relX + (cur.tx*sgn - relX)*tN;
    const Y0=REL_H + (cur.ty - REL_H)*tN;
    // 직선 경로 + 변화량
    let X=X0 + bx*bk - bx*tN;
    let Y=Y0 - (cur.by)*(bk - tN);
    // 중력 느낌의 기본 처짐 (모든 공 공통, 살짝)
    Y -= Math.sin(tN*Math.PI)*0.12;
    if(cur.shape==='knuckle'){
      const wb=knWobble(tN, knSeed);
      X+=wb.x*0.25*tN; Y+=wb.y*0.22*tN;
    }
    return {X:X, Y:Y, d:d, X0:X0, Y0:Y0};
  }

  function releaseT(t){
    if(throwT<0) return null;
    const e=t-throwT;
    if(e<0) return null;
    const dur=flightDur();
    const over = mode==='real' ? 1.10 : 1.0;   // 실전: 플레이트 지나 계속
    const tN=e/dur;
    if(tN>over){
      return 'done';
    }
    return tN;
  }

  // ───────── 타자 시점 ─────────
  function drawFront(t){
    // 하늘
    const sky=ctx.createLinearGradient(0,0,0,H*0.40);
    sky.addColorStop(0,'#060a14');
    sky.addColorStop(1,'#10203a');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*0.40);
    // 그라운드 (지평선 = 눈높이 부근)
    const HOR=H*0.34;
    const gr=ctx.createLinearGradient(0,HOR,0,H);
    gr.addColorStop(0,'#16321f');
    gr.addColorStop(1,'#0c1d12');
    ctx.fillStyle=gr; ctx.fillRect(0,HOR,W,H-HOR);
    // 관중석 띠
    ctx.fillStyle='#0b1322';
    ctx.fillRect(0,HOR-H*0.085,W,H*0.085);
    ctx.fillStyle='rgba(255,235,180,0.32)';
    for(let i=0;i<36;i++){
      ctx.fillRect((i*61.7)%W, HOR-H*0.08+((i*37.3)%(H*0.06)), 2,2);
    }
    // 조명탑
    for(const lx of [W*0.12, W*0.88]){
      ctx.strokeStyle='rgba(180,190,210,0.5)';
      ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(lx,HOR-H*0.085); ctx.lineTo(lx,H*0.05); ctx.stroke();
      ctx.save();
      ctx.shadowColor='#fff8dc'; ctx.shadowBlur=12;
      ctx.fillStyle='#fff3c4';
      for(let r2=0;r2<2;r2++) for(let c2=-1;c2<=1;c2++)
        ctx.fillRect(lx+c2*9-3, H*0.03+r2*9, 6,6);
      ctx.restore();
    }

    // ── 같은 자(proj)로 그리는 무대 ──
    // 마운드 (18.44m 거리, 폭 5.5m)
    const mC=proj(0, MOUND_H, MOUND_DIST);
    const mL=proj(-2.75, MOUND_H, MOUND_DIST);
    ctx.strokeStyle='rgba(200,160,110,0.65)';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.ellipse(mC.x, mC.y, Math.abs(mC.x-mL.x), Math.abs(mC.x-mL.x)*0.22, 0, 0, Math.PI*2);
    ctx.stroke();
    // 투수 (1.85m, 같은 자)
    drawPitcher(t);
    // 잔디 줄 (원근 간격)
    ctx.strokeStyle='rgba(255,255,255,0.05)';
    ctx.lineWidth=1.5;
    for(const dd of [4,7,11,15]){
      const p1=proj(-3,0,dd), p2=proj(3,0,dd);
      ctx.beginPath(); ctx.moveTo(0,p1.y); ctx.lineTo(W,p2.y); ctx.stroke();
      if(mode==='study'){
        ctx.fillStyle='rgba(255,255,255,0.22)';
        ctx.font='11px -apple-system,sans-serif';
        ctx.textAlign='left';
        ctx.fillText(dd+'m', 8, p1.y-4);
        ctx.strokeStyle='rgba(255,255,255,0.05)';
      }
    }
    // 스트라이크 존 — 입체 박스 (홈플레이트 앞변~뒤변, 깊이 0.43m)
    // 타자 눈엔 바닥에 비스듬히 선 사다리꼴로 보임 → 공간에 '서 있는' 느낌
    const zNear=0.0, zFar=0.43;                     // 플레이트 깊이
    const TLn=proj(-ZONE_W/2, ZONE_TOP, zNear), TRn=proj(ZONE_W/2, ZONE_TOP, zNear);
    const BLn=proj(-ZONE_W/2, ZONE_BOT, zNear), BRn=proj(ZONE_W/2, ZONE_BOT, zNear);
    const TLf=proj(-ZONE_W/2, ZONE_TOP, zFar), TRf=proj(ZONE_W/2, ZONE_TOP, zFar);
    const BLf=proj(-ZONE_W/2, ZONE_BOT, zFar), BRf=proj(ZONE_W/2, ZONE_BOT, zFar);
    // 뒷면 (먼 쪽, 흐리게)
    ctx.strokeStyle='rgba(255,255,255,0.16)';
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(TLf.x,TLf.y); ctx.lineTo(TRf.x,TRf.y); ctx.lineTo(BRf.x,BRf.y); ctx.lineTo(BLf.x,BLf.y); ctx.closePath();
    ctx.stroke();
    // 옆면 연결선 (깊이)
    ctx.strokeStyle='rgba(255,255,255,0.13)';
    ctx.beginPath();
    ctx.moveTo(TLn.x,TLn.y); ctx.lineTo(TLf.x,TLf.y);
    ctx.moveTo(TRn.x,TRn.y); ctx.lineTo(TRf.x,TRf.y);
    ctx.moveTo(BLn.x,BLn.y); ctx.lineTo(BLf.x,BLf.y);
    ctx.moveTo(BRn.x,BRn.y); ctx.lineTo(BRf.x,BRf.y);
    ctx.stroke();
    // 앞면 (가까운 쪽, 선명) — 9분할
    ctx.strokeStyle='rgba(255,255,255,0.4)';
    ctx.setLineDash([7,6]);
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(TLn.x,TLn.y); ctx.lineTo(TRn.x,TRn.y); ctx.lineTo(BRn.x,BRn.y); ctx.lineTo(BLn.x,BLn.y); ctx.closePath();
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle='rgba(255,255,255,0.1)';
    ctx.lineWidth=1;
    const lerp=(a,b,t)=>({x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t});
    ctx.beginPath();
    for(const t of [1/3,2/3]){
      const tp=lerp(TLn,TRn,t), bp=lerp(BLn,BRn,t);
      ctx.moveTo(tp.x,tp.y); ctx.lineTo(bp.x,bp.y);
      const lp=lerp(TLn,BLn,t), rp=lerp(TRn,BRn,t);
      ctx.moveTo(lp.x,lp.y); ctx.lineTo(rp.x,rp.y);
    }
    ctx.stroke();
    // 홈플레이트 — 입체 오각형 (지면에 누운)
    const pFL=proj(-ZONE_W/2,0,zFar), pFR=proj(ZONE_W/2,0,zFar);
    const pML=proj(-ZONE_W/2,0,zNear), pMR=proj(ZONE_W/2,0,zNear);
    const pTip=proj(0,0,-0.21);
    ctx.strokeStyle='rgba(255,255,255,0.5)';
    ctx.lineWidth=2.5;
    ctx.beginPath();
    ctx.moveTo(pFL.x,pFL.y); ctx.lineTo(pFR.x,pFR.y); ctx.lineTo(pMR.x,pMR.y);
    ctx.lineTo(pTip.x,pTip.y); ctx.lineTo(pML.x,pML.y); ctx.closePath();
    ctx.stroke();

    // ── 타자 실루엣 (좌/우타석 위치 표시) ──
    // 우타자는 3루쪽(화면 왼쪽, X음수), 좌타자는 1루쪽(화면 오른쪽, X양수)
    drawBatter();

    // 공
    const rel=releaseT(t);

    // ── 영구 궤적: 도착했어도 path가 있으면 항상 전체를 그린다 ──
    function drawPath(){
      if(path.length<2) return;
      // 0) 변화 없는 '기준 직선' (이 선 대비 얼마나 휘었는지 = 구종의 변화량)
      ctx.save();
      ctx.globalAlpha=0.35;
      ctx.strokeStyle='rgba(255,255,255,0.6)';
      ctx.lineWidth=1.5;
      ctx.setLineDash([4,5]);
      ctx.beginPath();
      for(let i=0;i<path.length;i++){
        if(path[i].X0===undefined) continue;
        const dC=Math.max(path[i].d,-CAM_BEHIND*0.7);
        const sp=proj(path[i].X0,path[i].Y0,dC);
        i?ctx.lineTo(sp.x,sp.y):ctx.moveTo(sp.x,sp.y);
      }
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
      // 1) 지면 그림자 궤적 (입체감 — 공이 공중에 떠 있음을 바닥선으로)
      ctx.save();
      ctx.globalAlpha=0.5;
      ctx.strokeStyle='rgba(0,0,0,0.55)';
      ctx.lineWidth=2;
      ctx.beginPath();
      for(let i=0;i<path.length;i++){
        const dC=Math.max(path[i].d,-CAM_BEHIND*0.7);
        const sp=proj(path[i].X,0,dC);
        i?ctx.lineTo(sp.x,sp.y):ctx.moveTo(sp.x,sp.y);
      }
      ctx.stroke();
      ctx.restore();
      // 2) 공 궤적 본선 (구종 색, 거리에 따라 굵기 증가 → 다가오는 입체감)
      ctx.save();
      ctx.lineCap='round'; ctx.lineJoin='round';
      for(let i=1;i<path.length;i++){
        const dC=Math.max(path[i].d,-CAM_BEHIND*0.7);
        const a=proj(path[i-1].X,path[i-1].Y,Math.max(path[i-1].d,-CAM_BEHIND*0.7));
        const b=proj(path[i].X,path[i].Y,dC);
        ctx.globalAlpha=0.85;
        ctx.strokeStyle=cur.color;
        ctx.lineWidth=Math.max(1.5, BALL_R_M*b.s*0.9);
        ctx.beginPath();
        ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
        ctx.stroke();
        // 높이 연결선 (공중 깊이감)
        if(i%3===0){
          const sp=proj(path[i].X,0,dC);
          ctx.globalAlpha=0.13;
          ctx.lineWidth=1;
          ctx.beginPath();
          ctx.moveTo(b.x,b.y); ctx.lineTo(sp.x,sp.y);
          ctx.stroke();
        }
      }
      ctx.restore();
      ctx.globalAlpha=1;
    }

    if(rel==='done'){
      // 도착 후: 전체 궤적 + 최종 도착점 공을 계속 표시 (지우지 않음)
      pathDone=true;
      drawPath();
      if(path.length){
        const last=path[path.length-1];
        const dC=Math.max(last.d,-CAM_BEHIND*0.7);
        const p2=proj(last.X,last.Y,dC);
        const r2=Math.max(2,BALL_R_M*p2.s);
        drawBallSpin(p2.x,p2.y,r2,t);
      }
      return;
    }
    if(rel===null){
      // 던지기 전: 이전 궤적이 남아 있으면 유지
      if(pathDone) drawPath();
      return;
    }

    const tN=rel;
    const w=ballWorld(tN);
    if(w.d < -CAM_BEHIND*0.7){ drawPath(); return; }   // 카메라 지나침
    // 비행 중 매 프레임 월드좌표 저장 (영구)
    path.push({X:w.X, Y:w.Y, d:w.d, X0:w.X0, Y0:w.Y0});
    const p=proj(w.X, w.Y, Math.max(w.d, -CAM_BEHIND*0.7));
    const r=Math.max(2, BALL_R_M*p.s);
    // 그동안의 전체 궤적 먼저 그리기
    drawPath();
    // 지면 그림자: 공이 공중에 '떠서' 오는 깊이감
    const sh=proj(w.X, 0, Math.max(w.d, -CAM_BEHIND*0.7));
    if(sh.y<H+30){
      ctx.save();
      ctx.globalAlpha=0.35;
      ctx.fillStyle='#000';
      ctx.beginPath();
      ctx.ellipse(sh.x, sh.y, r*1.5, r*0.45, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    drawBallSpin(p.x,p.y,r,t);
  }

  function drawBatter(){
    // 우타자: 화면 왼쪽 타석(X<0), 좌타자: 화면 오른쪽 타석(X>0)
    const side = batLefty? 1 : -1;
    const bx = side*0.95;          // 타석을 존에서 더 옆으로 (궤적 안 가리게)
    const dpt = 1.2;               // 깊이를 키워 원근상 작게
    const foot = proj(bx, 0, dpt);
    const head = proj(bx, 1.7, dpt);
    const h = foot.y - head.y;
    const x = foot.x, y = foot.y;
    ctx.save();
    ctx.globalAlpha=0.55;          // 살짝 투명 — 배경으로 물러나게
    ctx.strokeStyle='rgba(255,120,120,0.85)';
    ctx.fillStyle='rgba(255,120,120,0.85)';
    ctx.lineWidth=Math.max(1.5, h*0.06);
    ctx.lineCap='round'; ctx.lineJoin='round';
    // 머리
    ctx.beginPath();
    ctx.arc(x, y-h*0.86, Math.max(2,h*0.10), 0, Math.PI*2);
    ctx.fill();
    // 몸통
    ctx.beginPath();
    ctx.moveTo(x, y-h*0.74); ctx.lineTo(x, y-h*0.34);
    ctx.stroke();
    // 다리
    ctx.beginPath();
    ctx.moveTo(x, y-h*0.34); ctx.lineTo(x-h*0.11, y);
    ctx.moveTo(x, y-h*0.34); ctx.lineTo(x+h*0.11, y);
    ctx.stroke();
    // 배트 — 바깥쪽(존 반대편)으로 짧게 세움 → 궤적 침범 안 함
    const bs=side;   // 바깥 방향
    const sx=x+bs*h*0.06, sy=y-h*0.66;
    ctx.beginPath();
    ctx.moveTo(x, y-h*0.6);
    ctx.lineTo(sx, sy);
    ctx.lineTo(sx+bs*h*0.22, sy-h*0.26);
    ctx.stroke();
    ctx.restore();
    // 타석 라벨 (작게)
    ctx.fillStyle='rgba(255,150,150,0.6)';
    ctx.font='600 10px -apple-system,sans-serif';
    ctx.textAlign='center';
    ctx.fillText(batLefty?'좌타석':'우타석', x, y+12);
  }

  function drawPitcher(t){
    const sgn=lefty?-1:1;
    const base=proj(0, MOUND_H, MOUND_DIST);
    const head=proj(0, MOUND_H+PITCHER_H, MOUND_DIST);
    const h=base.y-head.y;     // 화면상 키
    const x=base.x, y=base.y;
    const wind = throwT>0 ? Math.min(1, Math.max(0, 1-(throwT-t)/600)) : 0;
    ctx.save();
    ctx.strokeStyle='rgba(230,234,240,0.95)';
    ctx.fillStyle='rgba(230,234,240,0.95)';
    ctx.lineWidth=Math.max(2, h*0.09);
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.arc(x, y-h*0.86, Math.max(2.5,h*0.12), 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x, y-h*0.72); ctx.lineTo(x, y-h*0.3);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y-h*0.3); ctx.lineTo(x-h*0.18, y);
    ctx.moveTo(x, y-h*0.3); ctx.lineTo(x+h*0.16, y);
    ctx.stroke();
    const aA=-2.3+wind*2.6;
    ctx.beginPath();
    ctx.moveTo(x, y-h*0.62);
    ctx.lineTo(x+Math.cos(aA)*h*0.4*sgn*-1, y-h*0.62+Math.sin(aA)*h*0.4);
    ctx.stroke();
    ctx.restore();
  }

  // ───────── 옆에서 ─────────
  function drawSide(t){
    ctx.fillStyle='#0a1626'; ctx.fillRect(0,0,W,H);
    const gy=H*0.80;
    ctx.fillStyle='#11251a'; ctx.fillRect(0,gy,W,H-gy);
    ctx.strokeStyle='rgba(255,255,255,0.3)';
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke();
    // 옆 뷰 자: 화면 가로 = 19m / 높이도 같은 비율
    const SX=W/19.5;
    const px=W*0.07;                      // 플레이트 x
    const mx=px+MOUND_DIST*SX;            // 마운드 x
    const mY=v=>gy-v*SX*3.2;              // 높이 (보기 좋게 세로만 3.2배 — 다이어그램 뷰)
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.fillRect(px-10, gy-3, 20, 4);
    ctx.strokeStyle='rgba(200,160,110,0.7)';
    ctx.beginPath();
    ctx.ellipse(mx, gy, 2.75*SX, 5, 0, Math.PI, Math.PI*2);
    ctx.stroke();
    // 존 (높이 띠)
    ctx.strokeStyle='rgba(255,255,255,0.28)';
    ctx.setLineDash([6,6]);
    ctx.strokeRect(px-12, mY(ZONE_TOP), 24, mY(ZONE_BOT)-mY(ZONE_TOP));
    ctx.setLineDash([]);
    // 높이 눈금
    ctx.fillStyle='rgba(255,255,255,0.25)';
    ctx.font='11px -apple-system,sans-serif';
    ctx.textAlign='left';
    for(const hh of [0.5,1.0,1.5]){
      ctx.fillRect(0, mY(hh), 8, 1);
      ctx.fillText(hh+'m', 11, mY(hh)+4);
    }
    // 투수 측면
    drawPitcherSide(mx, gy, mY, t);
    // 세로 과장 안내
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.textAlign='right';
    ctx.fillText('※ 높이는 보기 쉽게 확대한 다이어그램', W-10, 16);

    // ── 영구 궤적 (옆에서: 거리 d → x, 높이 Y → y) ──
    function drawSidePath(){
      if(path.length<2) return;
      // 기준 직선 (변화 없을 때) — 이 선 대비 휨이 곧 낙차
      ctx.save();
      ctx.globalAlpha=0.4;
      ctx.strokeStyle='rgba(255,255,255,0.55)';
      ctx.lineWidth=1.5;
      ctx.setLineDash([5,5]);
      ctx.beginPath();
      for(let i=0;i<path.length;i++){
        if(path[i].Y0===undefined) continue;
        const xx=px + path[i].d*SX;
        const yy=mY(path[i].Y0);
        i?ctx.lineTo(xx,yy):ctx.moveTo(xx,yy);
      }
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
      ctx.save();
      ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.strokeStyle=cur.color;
      ctx.lineWidth=3;
      ctx.beginPath();
      for(let i=0;i<path.length;i++){
        const xx=px + path[i].d*SX;
        const yy=mY(path[i].Y);
        i?ctx.lineTo(xx,yy):ctx.moveTo(xx,yy);
      }
      ctx.stroke();
      // 지면 그림자선 (높이감)
      ctx.globalAlpha=0.25;
      ctx.strokeStyle='rgba(0,0,0,0.6)';
      ctx.lineWidth=2;
      ctx.beginPath();
      for(let i=0;i<path.length;i++){
        const xx=px + path[i].d*SX;
        i?ctx.lineTo(xx,gy):ctx.moveTo(xx,gy);
      }
      ctx.stroke();
      ctx.restore();
      ctx.globalAlpha=1;
    }

    const rel=releaseT(t);
    if(rel==='done'){
      pathDone=true;
      drawSidePath();
      if(path.length){
        const last=path[path.length-1];
        drawBallSpin(px+last.d*SX, mY(last.Y), Math.max(3.5,W*0.012), t);
      }
      return;
    }
    if(rel===null){ if(pathDone) drawSidePath(); return; }
    const tN=Math.min(rel,1);
    const w=ballWorld(tN);
    path.push({X:w.X, Y:w.Y, d:w.d, X0:w.X0, Y0:w.Y0});
    const x=px + w.d*SX;
    const y=mY(w.Y);
    const r=Math.max(3.5, W*0.012);
    drawSidePath();
    drawBallSpin(x,y,r,t);
  }

  function drawPitcherSide(mx, gy, mY, t){
    const wind = throwT>0 ? Math.min(1, Math.max(0, 1-(throwT-t)/600)) : 0;
    const h=mY(0)-mY(PITCHER_H);
    const y=gy, x=mx;
    ctx.save();
    ctx.strokeStyle='rgba(230,234,240,0.9)';
    ctx.fillStyle='rgba(230,234,240,0.9)';
    ctx.lineWidth=Math.max(2.5, h*0.07);
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.arc(x, y-h*0.86, h*0.10, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x, y-h*0.74); ctx.lineTo(x+h*0.04, y-h*0.32);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x+h*0.04, y-h*0.32); ctx.lineTo(x-h*0.15-wind*h*0.15, y);
    ctx.moveTo(x+h*0.04, y-h*0.32); ctx.lineTo(x+h*0.14, y);
    ctx.stroke();
    const aA=-2.4+wind*2.9;
    ctx.beginPath();
    ctx.moveTo(x, y-h*0.66);
    ctx.lineTo(x+Math.cos(aA)*h*0.34, y-h*0.66+Math.sin(aA)*h*0.34);
    ctx.stroke();
    ctx.restore();
  }

  // ───────── 그립 (정밀화) ─────────
  function drawGrip(){
    // 배경
    const bgG=ctx.createLinearGradient(0,0,0,H);
    bgG.addColorStop(0,'#0c1830'); bgG.addColorStop(1,'#070e1c');
    ctx.fillStyle=bgG; ctx.fillRect(0,0,W,H);

    const cx=W/2, cy=H*0.34, R=Math.min(W,H)*0.24;

    // ── 공 본체 ──
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=20; ctx.shadowOffsetY=6;
    const bg=ctx.createRadialGradient(cx-R*0.35,cy-R*0.4,R*0.1,cx,cy,R*1.05);
    bg.addColorStop(0,'#ffffff');
    bg.addColorStop(0.7,'#f0ece2');
    bg.addColorStop(1,'#cfc8b8');
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
    ctx.fillStyle=bg; ctx.fill();
    ctx.restore();

    // ── 실밥: 그립 타입별로 방향/모양 다르게 ──
    drawSeams(cx,cy,R,cur.gripType||'fourseam');

    // ── 손가락: 실제 손가락 형태(관절 있는 길쭉한 모양) ──
    drawFingers(cx,cy,R,cur.gripType||'fourseam');

    // ── 범례 + 그립 설명 ──
    ctx.textAlign='center';
    ctx.fillStyle='#dfe3e8';
    ctx.font='700 14px -apple-system, sans-serif';
    ctx.fillText(cur.name+' 그립', cx, cy+R+38);
    // 설명 (줄바꿈 처리)
    ctx.fillStyle='#aeb6c4';
    ctx.font='13px -apple-system, sans-serif';
    wrapText(cur.gripTxt||'', cx, cy+R+62, W-48, 19);
  }

  // 그립 타입별 실밥
  function drawSeams(cx,cy,R,type){
    ctx.save();
    ctx.translate(cx,cy);
    ctx.strokeStyle='#c33c4e';
    ctx.lineCap='round';
    // 회전: 포심/스플리터는 가로 실밥(말굽이 위아래), 투심/싱커는 세로 실밥
    let rot=cur.seamRot;
    ctx.rotate(rot);
    const seam=(R0,a0,a1,cxx)=>{
      ctx.lineWidth=Math.max(3,R*0.05);
      ctx.beginPath();
      ctx.arc(cxx,0,R0,a0,a1);
      ctx.stroke();
      // 바늘땀
      ctx.lineWidth=Math.max(1.5,R*0.022);
      const steps=11;
      for(let i=0;i<=steps;i++){
        const a=a0+(a1-a0)*i/steps;
        const ax=cxx+Math.cos(a)*R0, ay=Math.sin(a)*R0;
        const nx=Math.cos(a), ny=Math.sin(a);
        ctx.beginPath();
        ctx.moveTo(ax-ny*R*0.07-nx*R*0.02, ay+nx*R*0.07-ny*R*0.02);
        ctx.lineTo(ax+ny*R*0.07+nx*R*0.02, ay-nx*R*0.07+ny*R*0.02);
        ctx.stroke();
      }
    };
    // 말굽 두 줄 (좌우 대칭)
    seam(R*1.5,  Math.PI-0.62, Math.PI+0.62, -R*1.25);
    seam(R*1.5, -0.62, 0.62, R*1.25);
    ctx.restore();
  }

  // 그립 타입별 손가락 (검지=I, 중지=M, 약지=R)
  function drawFingers(cx,cy,R,type){
    // 손가락 하나 그리기: 끝점(공 접점)에서 아래로 뻗는 길쭉한 형태
    function finger(tipX,tipY,len,ang,wide,label,pressure){
      const tx=cx+tipX*R, ty=cy+tipY*R;
      const dx=Math.sin(ang), dy=Math.cos(ang);
      const bx=tx+dx*len*R, by=ty+dy*len*R;       // 손가락 뿌리쪽
      // 손가락 본체 (살색, 둥근 막대)
      ctx.save();
      ctx.lineCap='round';
      ctx.strokeStyle='rgba(228,196,170,0.92)';
      ctx.lineWidth=R*wide;
      ctx.beginPath();
      ctx.moveTo(tx,ty); ctx.lineTo(bx,by);
      ctx.stroke();
      // 손가락 외곽선
      ctx.strokeStyle='rgba(150,110,90,0.5)';
      ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(bx,by); ctx.stroke();
      // 손톱(접점) — 압력 강하면 빨갛게
      ctx.shadowColor=pressure>1?'#ff6a6a':'#78aaff';
      ctx.shadowBlur=pressure>1?14:9;
      ctx.fillStyle=pressure>1?'#ff8a8a':'#bcd4ff';
      ctx.beginPath();
      ctx.arc(tx,ty,R*0.085*(pressure>1?1.25:1),0,Math.PI*2);
      ctx.fill();
      ctx.restore();
      // 라벨
      if(label){
        ctx.fillStyle='rgba(255,255,255,0.85)';
        ctx.font='700 11px -apple-system,sans-serif';
        ctx.textAlign='center';
        ctx.fillText(label, tx, ty-R*0.16);
      }
    }
    // 엄지 (아래쪽에서 받침)
    function thumb(tipX,tipY){
      const tx=cx+tipX*R, ty=cy+tipY*R;
      ctx.save();
      ctx.lineCap='round';
      ctx.strokeStyle='rgba(228,196,170,0.85)';
      ctx.lineWidth=R*0.26;
      ctx.beginPath();
      ctx.moveTo(tx,ty); ctx.lineTo(tx-R*0.3, ty+R*0.5);
      ctx.stroke();
      ctx.shadowColor='#78aaff'; ctx.shadowBlur=8;
      ctx.fillStyle='#bcd4ff';
      ctx.beginPath(); ctx.arc(tx,ty,R*0.075,0,Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.fillStyle='rgba(255,255,255,0.6)';
      ctx.font='600 10px -apple-system,sans-serif';
      ctx.textAlign='center';
      ctx.fillText('엄지', tx-R*0.25, ty+R*0.34);
    }

    const L=0.95;  // 손가락 길이
    switch(type){
      case 'fourseam': // 검지·중지 모아 가로 실밥 위
        finger(-0.17,-0.48,L,-0.12,0.20,'검지',1);
        finger( 0.17,-0.48,L, 0.12,0.20,'중지',1);
        thumb(0,0.62); break;
      case 'twoseam': // 좁게 모아 세로 실밥
        finger(-0.10,-0.50,L,-0.05,0.19,'검지',1.3);
        finger( 0.10,-0.50,L, 0.05,0.19,'중지',1);
        thumb(0,0.62); break;
      case 'cutter': // 살짝 글러브쪽으로
        finger(-0.02,-0.50,L,-0.08,0.19,'검지',1.4);
        finger( 0.22,-0.45,L, 0.18,0.19,'중지',1);
        thumb(-0.1,0.6); break;
      case 'slider': // 바깥 절반, 중지 실밥에 걸기
        finger( 0.06,-0.49,L, 0.05,0.19,'검지',1);
        finger( 0.30,-0.40,L, 0.28,0.19,'중지',1.4);
        thumb(-0.16,0.58); break;
      case 'curve': // 바짝 모으고 중지 깊게
        finger(-0.06,-0.50,L,-0.10,0.18,'검지',1);
        finger( 0.14,-0.49,L, 0.02,0.18,'중지',1.5);
        thumb(0.02,0.6); break;
      case 'circle': // 서클 체인지업 — 엄지+검지 동그라미
        // 동그라미
        ctx.save();
        ctx.strokeStyle='rgba(228,196,170,0.95)';
        ctx.lineWidth=R*0.13;
        ctx.beginPath();
        ctx.arc(cx-R*0.42, cy+R*0.12, R*0.26, 0, Math.PI*2);
        ctx.stroke();
        ctx.restore();
        ctx.fillStyle='rgba(255,255,255,0.8)';
        ctx.font='700 11px -apple-system,sans-serif';
        ctx.textAlign='center';
        ctx.fillText('○ 서클', cx-R*0.42, cy-R*0.22);
        finger( 0.06,-0.50,L*0.9, 0.04,0.18,'중지',1);
        finger( 0.30,-0.42,L*0.9, 0.22,0.17,'약지',1);
        thumb(-0.05,0.6); break;
      case 'split': // V자로 쫙 벌림
        finger(-0.42,-0.30,L,-0.55,0.19,'검지',1);
        finger( 0.42,-0.30,L, 0.55,0.19,'중지',1);
        thumb(0,0.62);
        // 벌어진 강조 호
        ctx.save();
        ctx.strokeStyle='rgba(120,170,255,0.4)';
        ctx.lineWidth=2; ctx.setLineDash([4,4]);
        ctx.beginPath();
        ctx.arc(cx,cy-R*0.3,R*0.5,Math.PI*0.78,Math.PI*0.22,true);
        ctx.stroke(); ctx.setLineDash([]);
        ctx.restore(); break;
      case 'knuckle': // 손톱 세우기
        for(const fx of [-0.2,0,0.2]){
          const tx=cx+fx*R, ty=cy-R*0.46;
          ctx.save();
          ctx.fillStyle='rgba(228,196,170,0.9)';
          ctx.strokeStyle='rgba(150,110,90,0.6)';
          ctx.lineWidth=1.2;
          // 세운 손톱 = 작은 사각
          ctx.beginPath();
          ctx.rect(tx-R*0.05,ty-R*0.02,R*0.1,R*0.16);
          ctx.fill(); ctx.stroke();
          ctx.shadowColor='#ff6a6a'; ctx.shadowBlur=8;
          ctx.fillStyle='#ff8a8a';
          ctx.beginPath(); ctx.arc(tx,ty,R*0.05,0,Math.PI*2); ctx.fill();
          ctx.restore();
        }
        ctx.fillStyle='rgba(255,255,255,0.8)';
        ctx.font='700 11px -apple-system,sans-serif';
        ctx.textAlign='center';
        ctx.fillText('손톱을 세워 박기', cx, cy-R*0.62);
        thumb(0,0.62); break;
      default:
        finger(-0.17,-0.48,L,-0.12,0.20,'검지',1);
        finger( 0.17,-0.48,L, 0.12,0.20,'중지',1);
        thumb(0,0.62);
    }
  }

  // 캔버스 텍스트 줄바꿈
  function wrapText(text,x,y,maxW,lh){
    const chars=text.split('');
    let line='', yy=y;
    for(let i=0;i<chars.length;i++){
      const test=line+chars[i];
      if(ctx.measureText(test).width>maxW && line){
        ctx.fillText(line,x,yy);
        line=chars[i]; yy+=lh;
      } else line=test;
    }
    if(line) ctx.fillText(line,x,yy);
  }

  // ───────── 공 + 회전 ─────────
  function shade(hex,f){
    const n=parseInt(hex.slice(1),16);
    return 'rgb('+Math.floor(((n>>16)&255)*f)+','+Math.floor(((n>>8)&255)*f)+','+Math.floor((n&255)*f)+')';
  }
  function drawBallSpin(x,y,r,t){
    ctx.save();
    ctx.translate(x,y);
    ctx.shadowColor=cur.color;
    ctx.shadowBlur=Math.min(16, r*1.2);
    const bg=ctx.createRadialGradient(-r*0.35,-r*0.35,r*0.1, 0,0,r);
    bg.addColorStop(0,'#ffffff');
    bg.addColorStop(0.35,cur.color);
    bg.addColorStop(1, shade(cur.color,0.45));
    ctx.beginPath();
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle=bg;
    ctx.fill();
    ctx.shadowBlur=0;
    if(r>5 && cur.spin!=='none'){
      const rot=t*cur.spinSpd*0.05;
      ctx.strokeStyle='rgba(190,40,60,0.85)';
      ctx.lineWidth=Math.max(1, r*0.1);
      if(cur.spin==='side'){
        for(let i=-1;i<=1;i++){
          const off=Math.sin(rot+i*2.1)*r*0.65;
          ctx.beginPath(); ctx.moveTo(off,-r*0.65); ctx.lineTo(off,r*0.65); ctx.stroke();
        }
        if(cur.key==='slider'||cur.key==='cutter'||cur.key==='sweeper'){
          ctx.beginPath();
          ctx.arc(0,0,r*0.2,0,Math.PI*2);
          ctx.fillStyle='rgba(190,40,60,0.7)';
          ctx.fill();
        }
      }else{
        const dirv=cur.spin==='top'?1:(cur.spin==='down'?1.3:-1);
        for(let i=-1;i<=1;i++){
          const off=((rot*dirv+i*2.1)%(Math.PI*2))/(Math.PI*2)*r*2-r;
          ctx.beginPath(); ctx.moveTo(-r*0.65,off); ctx.lineTo(r*0.65,off); ctx.stroke();
        }
      }
    }
    ctx.restore();
  }

  function loop(){
    const t=performance.now();
    if(view==='front') drawFront(t);
    else if(view==='side') drawSide(t);
    else drawGrip();
    requestAnimationFrame(loop);
  }

  resize();
  updateInfo();
  updateMatchup();
  doThrow('study');
  loop();
})();
</script>
</body>
